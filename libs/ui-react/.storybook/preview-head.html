<style>
  body,
  .sbdocs-preview,
  .sb-preparing-story,
  .sb-preparing-docs {
    background-color: #fff !important;
    color: var(--text-base);
  }

  .dark body,
  .dark .sbdocs-preview,
  .dark .sb-preparing-story,
  .dark .sb-preparing-docs {
    background-color: #000 !important;
  }

  /* Change link color to purple (exclude heading auto-anchors) */
  .sbdocs-content :where(a:not(.sb-anchor,
      .sb-unstyled,
      .sb-unstyled a,
      [aria-hidden='true'])) {
    color: rgb(126, 78, 165) !important;
    text-decoration: underline !important;
    cursor: pointer !important;
  }

  .sbdocs-content :where(a:not(.sb-anchor,
      .sb-unstyled,
      .sb-unstyled a,
      [aria-hidden='true'])):hover {
    color: rgb(66, 30, 94) !important;
  }

  /* Remove border bottom from h2 */
  .sbdocs-content :where(h2:not(.sb-unstyled, .sb-unstyled h2)) {
    border-bottom: none !important;
  }

  /*
   * Storybook auto-generates a heading anchor (<a aria-hidden="true">)
   * inside every MDX heading with `float: left; margin-left: -24px`.
   * That float occupies layout space even when its <svg> is
   * `visibility: hidden`, which pushes heading text a few pixels to the
   * right. Take it out of normal flow so the heading sits flush, and
   * silence the default focus ring that appears after a dark-mode toggle.
   */
  .sbdocs-content :is(h1, h2, h3, h4, h5, h6) {
    position: relative;
  }

  .sbdocs-content :is(h1, h2, h3, h4, h5, h6)>a[aria-hidden='true'] {
    position: absolute;
    left: -24px;
    padding: 0;
    float: none;
    outline: none;
  }

  .sbdocs-content :is(h1, h2, h3, h4, h5, h6)>a[aria-hidden='true']:focus,
  .sbdocs-content :is(h1, h2, h3, h4, h5, h6)>a[aria-hidden='true']:focus-visible {
    outline: none;
  }

  /*
   * Dark mode overrides for the Source block (.docblock-source).
   * Storybook's SyntaxHighlighter applies token colors as inline styles via
   * prism-react-renderer. !important is required to beat those inline styles.
   */
  .dark .docblock-source {
    background: #1e1e1e !important;
  }

  .dark .docblock-source code,
  .dark .docblock-source pre {
    background: transparent !important;
    color: #d4d4d4 !important;
  }

  .dark .docblock-source .token.comment,
  .dark .docblock-source .token.prolog,
  .dark .docblock-source .token.doctype,
  .dark .docblock-source .token.cdata {
    color: #6a9955 !important;
  }

  .dark .docblock-source .token.punctuation {
    color: #d4d4d4 !important;
  }

  .dark .docblock-source .token.tag,
  .dark .docblock-source .token.keyword,
  .dark .docblock-source .token.boolean,
  .dark .docblock-source .token.important {
    color: #569cd6 !important;
  }

  .dark .docblock-source .token.string,
  .dark .docblock-source .token.char,
  .dark .docblock-source .token.url,
  .dark .docblock-source .token.attr-value,
  .dark .docblock-source .token.inserted {
    color: #ce9178 !important;
  }

  .dark .docblock-source .token.number,
  .dark .docblock-source .token.unit {
    color: #b5cea8 !important;
  }

  .dark .docblock-source .token.function,
  .dark .docblock-source .token.function-variable {
    color: #dcdcaa !important;
  }

  .dark .docblock-source .token.class-name,
  .dark .docblock-source .token.maybe-class-name {
    color: #4ec9b0 !important;
  }

  .dark .docblock-source .token.attr-name,
  .dark .docblock-source .token.property,
  .dark .docblock-source .token.selector {
    color: #9cdcfe !important;
  }

  .dark .docblock-source .token.operator,
  .dark .docblock-source .token.entity {
    color: #d4d4d4 !important;
  }

  .dark .docblock-source .token.constant,
  .dark .docblock-source .token.symbol,
  .dark .docblock-source .token.deleted {
    color: #f44747 !important;
  }

  .dark .docblock-source .token.namespace {
    opacity: 0.7;
  }
</style>
