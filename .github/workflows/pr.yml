name: Pull Request Checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read # Required for reading workflow runs and status checks
  contents: read
  id-token: write # Required for SonarCloud OIDC authentication

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

env:
  NX_NO_CLOUD: true

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4

      - run: npx nx run-many --targets=build-deps --all
      - run: npx nx affected -t lint typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4

      - run: npx nx affected -t build

  bundle-checks:
    name: Bundle checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4

      - run: npx nx affected -t test:tree-shaking

  unit-testing:
    name: Unit Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4

      - run: npx nx affected -t test --passWithNoTests --coverage

      - name: Fix lcov paths to be relative to workspace root
        run: |
          for lib in ui-react utils-shared design-core; do
            lcov="libs/$lib/test-output/vitest/coverage/lcov.info"
            [ -f "$lcov" ] && sed -i "s|^SF:|SF:libs/$lib/|" "$lcov"
          done
          lcov="libs/ui-rnative/test-output/jest/coverage/lcov.info"
          [ -f "$lcov" ] && sed -i "s|^SF:|SF:libs/ui-rnative/|" "$lcov"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            libs/ui-react/test-output/vitest/coverage/lcov.info
            libs/ui-rnative/test-output/jest/coverage/lcov.info
            libs/utils-shared/test-output/vitest/coverage/lcov.info
            libs/design-core/test-output/vitest/coverage/lcov.info
          if-no-files-found: warn

  sonar:
    name: Sonar scan
    needs: unit-testing
    if: ${{ !cancelled() && needs.unit-testing.result == 'success' }}
    uses: ./.github/workflows/scan-sonar-called.yml
    with:
      should_download_coverage: true
    secrets: inherit
